name: Install from GitHub

on:
  push:
  pull_request:

jobs:
  GitHub:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false

    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install from GitHub
      shell: bash
      run: |
        python -m pip install "git+https://github.com/${GITHUB_REPOSITORY}.git@${GITHUB_SHA}"

    - name: Smoke test
      run: fasm --help
